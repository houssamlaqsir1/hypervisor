spring:
  application:
    name: hypervisor

  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres}
    username: ${DB_USER:postgres.dvbykdjajmnpukwafecy}
    password: ${DB_PASSWORD:L@qs!r1020304050}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

hypervisor:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  alert-radio:
    # Mock endpoint exposed by this same backend for PFE demos.
    url: ${ALERT_RADIO_URL:http://localhost:8080/api/alert-radio/receive}
    enabled: true
  correlation:
    escalation-window-minutes: 5
    escalation-threshold: 3
    high-confidence-threshold: 0.7

logging:
  level:
    com.oncf.hypervisor: INFO
